services:
  chroma:
    image: chromadb/chroma:latest
    container_name: go-commerce-qa-chroma
    volumes:
      - ./data/index/chroma-server:/chroma/chroma

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: go-commerce-qa-api
    env_file:
      - .env
    environment:
      USE_CHROMA: "true"
      CHROMA_MODE: "http"
      CHROMA_HOST: "chroma"
      CHROMA_PORT: "8000"
      REPO_ROOT: "/workspace/go-commerce"
      DATA_DIR: "/app/data"
    volumes:
      - ./data:/app/data
      - ../../:/workspace/go-commerce:ro
    depends_on:
      - chroma

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: go-commerce-qa-web
    ports:
      - "3001:80"
    depends_on:
      - api

  indexer:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: go-commerce-qa-indexer
    env_file:
      - .env
    environment:
      USE_CHROMA: "true"
      CHROMA_MODE: "http"
      CHROMA_HOST: "chroma"
      CHROMA_PORT: "8000"
      REPO_ROOT: "/workspace/go-commerce"
      DATA_DIR: "/app/data"
    volumes:
      - ./data:/app/data
      - ../../:/workspace/go-commerce:ro
    depends_on:
      - chroma
    command: ["python", "/app/scripts/index_once.py"]
    profiles:
      - tools
